name: Validate Proxies

# Runs every 10 minutes; the concurrency group guarantees a new pipeline never
# overlaps an in-progress one (the next run waits for the current to finish).
#
# Pipeline:  prepare  ->  validate (16 parallel shards)  ->  merge + rank + commit
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Max simultaneous checks per shard"
        default: "500"
      timeout:
        description: "Per-request timeout (seconds)"
        default: "7"
      max_candidates:
        description: "Cap total candidates (0 = no cap)"
        default: "0"
      include_bulk:
        description: "Also scan the huge bulk lists (true/false)"
        default: "false"

concurrency:
  group: validate-proxies
  cancel-in-progress: false

permissions:
  contents: write

env:
  PY: "3.11"

jobs:
  # ----------------------------------------------------------------------- #
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - name: Fetch + dedupe + tag all sources
        env:
          MAX_CANDIDATES: ${{ github.event.inputs.max_candidates || '8000' }}
          INCLUDE_BULK: ${{ github.event.inputs.include_bulk || 'false' }}
        run: python validator.py prepare --out candidates.jsonl
      - uses: actions/upload-artifact@v5
        with:
          name: candidates
          path: candidates.jsonl
          retention-days: 1

  # ----------------------------------------------------------------------- #
  validate:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - uses: actions/download-artifact@v5
        with: { name: candidates }
      - name: Validate shard ${{ matrix.shard }}/8
        env:
          CONCURRENCY: ${{ github.event.inputs.concurrency || '500' }}
          TIMEOUT: ${{ github.event.inputs.timeout || '7' }}
        run: |
          python validator.py validate \
            --candidates candidates.jsonl \
            --shard ${{ matrix.shard }}:8 \
            --out partials/${{ matrix.shard }}.json
      - uses: actions/upload-artifact@v5
        with:
          name: partial-${{ matrix.shard }}
          path: partials/${{ matrix.shard }}.json
          retention-days: 1

  # ----------------------------------------------------------------------- #
  merge:
    needs: validate
    if: always()          # rank whatever shards succeeded, even if some failed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5          # brings results/history.json forward
      - uses: actions/setup-python@v6
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt
      - name: Collect all shard partials
        uses: actions/download-artifact@v5
        with:
          pattern: partial-*
          path: partials
          merge-multiple: true
      - name: Merge + rank
        run: python validator.py merge --partials "partials/*.json"
      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: refresh ranked proxies [skip ci]"
            git push
          fi
